name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-mutants,cargo-audit
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo check --all-targets
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build --release
      - run: cargo llvm-cov --fail-under-lines 85
      # cargo mutants exits nonzero when a mutant survives; scope is .cargo/mutants.toml
      - run: cargo mutants
      - run: cargo audit
      - name: Slophammer (pin exact; bump both lines together on upgrades)
        run: |
          cargo install slophammer-rs --version 0.4.0 --locked
          slophammer-rs dry .
          slophammer-rs check .
