name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run ty check src
      - run: uv run pytest --cov=src/herdr_branch_cleanup --cov-fail-under=85
      - name: Mutation testing behind the kill-rate floor
        run: |
          set -euo pipefail
          uv run mutmut run 2>&1 | tee /tmp/mutmut.log
          uv run python scripts/check_mutation.py --min-kill-rate 90 --stats-file /tmp/mutmut.log
      - name: Audit dependencies
        run: |
          uv export --frozen --no-emit-project -o /tmp/requirements.txt
          uvx pip-audit -r /tmp/requirements.txt --disable-pip
      # Keep the slophammer-py pin exact; bump both lines together on upgrades.
      - run: uvx --from slophammer-py==0.4.0 slophammer-py dry .
      - run: uvx --from slophammer-py==0.4.0 slophammer-py check .
