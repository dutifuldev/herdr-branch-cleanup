id = "branch-cleanup"
name = "Branch Cleanup"
version = "0.2.1"
min_herdr_version = "0.7.0"
description = "Checks out the default branch in a pane's repo when its branch is merged or deleted on GitHub"
platforms = ["linux", "macos"]

[[build]]
command = ["cargo", "build", "--release"]

[[actions]]
id = "start"
title = "Start branch cleanup poller"
command = ["target/release/herdr-branch-cleanup", "start"]

[[actions]]
id = "stop"
title = "Stop branch cleanup poller"
command = ["target/release/herdr-branch-cleanup", "stop"]

[[actions]]
id = "toggle"
title = "Toggle branch cleanup poller"
command = ["target/release/herdr-branch-cleanup", "toggle"]

[[actions]]
id = "cleanup-now"
title = "Run one cleanup sweep now"
command = ["target/release/herdr-branch-cleanup", "once"]

[[panes]]
id = "board"
title = "Branch cleanup"
placement = "overlay"
command = ["target/release/herdr-branch-cleanup", "board"]

# Idempotent autostart: the first pane of any session boots the poller.
[[events]]
on = "pane.created"
command = ["target/release/herdr-branch-cleanup", "start"]

# Sweep immediately when an agent finishes; that is when merges just happened.
[[events]]
on = "pane.agent_status_changed"
command = ["target/release/herdr-branch-cleanup", "nudge"]
